body { font-family: 'Inter', sans-serif; background-color: #f8f9fb; }

.glass-effect { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
.primary-gradient { background: linear-gradient(135deg, #8127cf 0%, #9c48ea 100%); }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

        </div>
        <h2 class="font-headline text-2xl font-bold text-on-surface mb-2">预约成功</h2>
        <p class="text-sm text-outline">请在预约时间前到达空间</p>
    </div>

    <!-- 预约信息卡片 -->
    <div class="bg-surface-container-lowest rounded-3xl p-5 mb-6 shadow-[0_4px_20px_rgba(129,39,207,0.06)]">
        <div class="flex items-center justify-between mb-4 pb-4 border-b border-outline-variant/20">
            <span class="text-sm text-outline">预约编号</span>
            <span class="font-headline font-bold text-on-surface">BK20260408001</span>
        </div>
        <div class="flex gap-4 mb-4">
            <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=80&h=80&fit=crop" alt="创客空间" class="w-16 h-16 rounded-xl object-cover"/>
            <div class="flex-1">

        </div>
    </div>

    <!-- 时间信息 -->

        <h4 class="font-headline font-bold text-on-surface mb-4">预约时间</h4>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-surface-container-low rounded-xl p-4">
                <p class="text-xs text-outline mb-1">日期</p>

            <div class="bg-surface-container-low rounded-xl p-4">

                <p class="text-xs text-outline mt-1">08:00 - 12:00</p>
            </div>
        </div>
        <div class="flex items-center gap-4 mt-4 pt-4 border-t border-outline-variant/20">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-xl">groups</span>
                <span class="text-sm font-medium text-on-surface">8人</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-xl">schedule</span>
                <span class="text-sm font-medium text-on-surface">4小时</span>
            </div>
        </div>
