<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X-HUB | 扫码签到</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
    theme: {
        extend: {
            colors: {
                primary: "#8127cf",
                "primary-container": "#9c48ea",
                "on-primary": "#ffffff",
                background: "#f8f9fb",
                surface: "#f8f9fb",
                "surface-container-low": "#f3f4f6",
                "surface-container-lowest": "#ffffff",
                "on-surface": "#191c1e",
                outline: "#7e7385",
                "outline-variant": "#cfc2d6",
                secondary: "#734d97",
                "secondary-container": "#d7adff",
            },
            fontFamily: {
                headline: ["Space Grotesk"],
                body: ["Inter"],
            }
        }
    }
}
</script>
<style>
body { font-family: 'Inter', sans-serif; background-color: #f8f9fb; }
.font-headline { font-family: 'Space Grotesk', sans-serif; }
.glass-effect { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
.primary-gradient { background: linear-gradient(135deg, #8127cf 0%, #9c48ea 100%); }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="antialiased overflow-x-hidden min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md shadow-[0_12px_40px_rgba(129,39,207,0.06)] h-16 flex items-center px-4 gap-4">
    <button onclick="history.back()" class="w-10 h-10 rounded-full hover:bg-surface-container-low flex items-center justify-center transition-colors">
        <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <h1 class="flex-1 font-headline text-xl font-bold text-on-surface">扫码签到</h1>
</header>

<main class="pt-20 px-4 max-w-screen-xl mx-auto">
    <!-- 扫码区域 -->
    <div class="bg-surface-container-lowest rounded-3xl p-6 mb-6 shadow-[0_4px_20px_rgba(129,39,207,0.06)]">
        <div class="aspect-square bg-black rounded-2xl relative overflow-hidden mb-6">
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-64 h-64 border-2 border-primary rounded-2xl relative">
                    <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl"></div>
                    <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr"></div>
                    <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl"></div>
                    <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br"></div>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span class="material-symbols-outlined text-white/50 text-8xl">qr_code_scanner</span>
                    </div>
                </div>
            </div>
            <!-- 扫描线动画 -->
            <div class="absolute left-4 right-4 h-0.5 bg-primary/80 animate-pulse" style="top: 50%;"></div>
        </div>
        <p class="text-center text-sm text-outline">将二维码放入框内即可自动扫描</p>
    </div>

    <!-- 手动输入 -->
    <div class="bg-surface-container-lowest rounded-3xl p-5 mb-6 shadow-[0_4px_20px_rgba(129,39,207,0.06)]">
        <h3 class="font-headline font-bold text-on-surface mb-4">或手动输入验证码</h3>
        <div class="flex gap-3">
            <input type="text" placeholder="请输入预约验证码" class="flex-1 px-4 py-3 bg-surface-container-low rounded-xl text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary/20"/>
            <button class="px-6 py-3 primary-gradient rounded-xl text-white font-semibold shadow-md shadow-primary/20">确认</button>
        </div>
    </div>

    <!-- 最近签到 -->
    <div class="bg-surface-container-lowest rounded-3xl p-5 shadow-[0_4px_20px_rgba(129,39,207,0.06)]">
        <h3 class="font-headline font-bold text-on-surface mb-4">最近签到</h3>
        <div class="space-y-3">
            <div class="flex items-center gap-4 p-4 bg-green-50 rounded-2xl">
                <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center">
                    <span class="material-symbols-outlined text-green-600">check_circle</span>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-medium text-on-surface">李明</p>
                    <p class="text-xs text-outline">创客空间 A区 · 14:32 签到成功</p>
                </div>
                <span class="text-xs text-green-600 font-medium">已完成</span>
            </div>
            <div class="flex items-center gap-4 p-4 bg-surface-container-low rounded-2xl">
                <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center">
                    <span class="material-symbols-outlined text-green-600">check_circle</span>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-medium text-on-surface">王芳</p>
                    <p class="text-xs text-outline">量子实验室 · 13:15 签到成功</p>
                </div>
                <span class="text-xs text-green-600 font-medium">已完成</span>
            </div>
            <div class="flex items-center gap-4 p-4 bg-surface-container-low rounded-2xl">
                <div class="w-10 h-10 rounded-full bg-yellow-100 flex items-center justify-center">
                    <span class="material-symbols-outlined text-yellow-600">schedule</span>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-medium text-on-surface">张伟</p>
                    <p class="text-xs text-outline">禅意行政套房 · 预约 15:00</p>
                </div>
                <span class="text-xs text-yellow-600 font-medium">待使用</span>
            </div>
        </div>
    </div>
</main>
</body>
</html>
